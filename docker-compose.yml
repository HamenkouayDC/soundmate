# Для отчётности по стеку. Backend-команда в разработке Docker не использует.
services:
  web:
    build: ./backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: soundmate
      POSTGRES_PASSWORD: soundmate
      POSTGRES_DB: soundmate
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U soundmate -d soundmate"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
